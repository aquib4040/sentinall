{% extends "base.html" %}

{% block title %}SENTINALL // {{ error_title }}{% endblock %}

{% block content %}
<div class="relative w-full max-w-2xl mx-auto text-center">
    <div class="glass-panel border border-error/20 rounded-lg p-12 shadow-[0_0_50px_rgba(255,110,132,0.1)] relative overflow-hidden">
        <div class="absolute top-0 right-0 p-4 opacity-10">
            <span class="material-symbols-outlined text-8xl">error</span>
        </div>
        
        <div class="mb-10 relative z-10">
            <div class="inline-flex items-center gap-2 px-3 py-1 bg-error/10 rounded-full border border-error/20 mb-8">
                <span class="w-2 h-2 bg-error rounded-full animate-pulse"></span>
                <span class="font-mono text-[10px] tracking-[0.2em] text-error uppercase font-bold">Protocol_Error</span>
            </div>
            
            <h1 class="text-4xl md:text-5xl font-black tracking-tighter text-on-surface uppercase mb-6 drop-shadow-[0_0_15px_rgba(255,110,132,0.3)]">
                {{ error_title }}
            </h1>
            
            <p class="text-on-surface-variant font-body text-lg leading-relaxed max-w-lg mx-auto italic">
                "{{ error_message }}"
            </p>
        </div>

        <div class="h-[1px] w-full bg-gradient-to-r from-transparent via-outline-variant/30 to-transparent mb-10"></div>

        <div class="space-y-6">
            <p class="text-[10px] font-black tracking-[0.4em] text-outline-variant uppercase">Access_Permanently_Flagged</p>
            <div class="flex justify-center gap-4">
                <a href="/" class="px-6 py-3 bg-surface-container border border-outline-variant/30 text-on-surface text-xs font-bold tracking-widest uppercase rounded-lg hover:bg-surface-bright transition-all">
                    System Hub
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
