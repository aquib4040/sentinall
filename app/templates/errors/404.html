{% extends "base.html" %}

{% block title %}SENTINALL // 404_NOT_FOUND{% endblock %}

{% block content %}
<div class="relative w-full max-w-2xl mx-auto text-center">
    <div class="w-full h-full flex flex-col items-center justify-center py-20">
        <h1 class="text-[12rem] font-black text-outline-variant/10 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 select-none">404</h1>
        
        <div class="relative z-10">
            <div class="text-primary text-6xl mb-8 animate-bounce">
                <span class="material-symbols-outlined" style="font-size: 80px;">ghost_off</span>
            </div>
            <h2 class="text-2xl font-black tracking-[0.3em] text-on-surface uppercase mb-4">NODE_NOT_FOUND</h2>
            <p class="text-on-surface-variant font-mono text-sm max-w-md mx-auto mb-12">
                The requested memory address is invalid or has been scrubbed from the canon.
            </p>
            
            <a href="{{ url_for('main.index') }}" class="inline-flex items-center gap-3 px-8 py-4 bg-primary text-on-primary font-black tracking-widest uppercase rounded-xl hover:scale-105 active:scale-95 transition-all shadow-[0_0_20px_rgba(204,151,255,0.3)]">
                <span class="material-symbols-outlined">home</span>
                Return to Core
            </a>
        </div>
    </div>
</div>
{% endblock %}
