{% extends "base.html" %}

{% block title %}SENTINALL // Master Access{% endblock %}

{% block content %}
<div class="w-full max-w-lg z-10 mx-auto">
    <!-- Alert States -->
    {% if error %}
    <div class="mb-8 p-4 rounded-xl bg-error-container/20 border border-error/30 text-error flex items-center gap-4">
        <span class="material-symbols-outlined">warning</span>
        <span class="text-sm font-medium tracking-wide">ACCESS_DENIED: {{ error }}</span>
    </div>
    {% endif %}

    <!-- Auth Container -->
    <div class="glass-panel rounded-2xl border border-outline-variant/40 shadow-[0_0_50px_rgba(255,110,132,0.15)] overflow-hidden">
        <div class="p-4 bg-error/10 border-b border-error/20">
            <h2 class="text-center text-xs font-black tracking-[0.5em] uppercase text-error">CRITICAL_SYSTEM_ACCESS</h2>
        </div>
        
        <div class="p-8 md:p-12">
            <div class="mb-10 text-center">
                <div class="w-20 h-20 rounded-full bg-error/20 border border-error/30 flex items-center justify-center mx-auto mb-4 animate-pulse">
                    <span class="material-symbols-outlined text-error" style="font-size: 40px; font-variation-settings: 'FILL' 1;">admin_panel_settings</span>
                </div>
                <p class="text-on-surface-variant text-xs font-bold tracking-widest uppercase">Input Master Credentials</p>
            </div>

            <form action="{{ url_for('auth.owner_login') }}" method="POST" class="space-y-8">
                <div class="space-y-6">
                    <div class="group">
                        <label class="block text-[10px] font-bold tracking-[0.2em] uppercase text-on-surface-variant mb-2 ml-1">Master_ID</label>
                        <div class="relative flex items-center rounded-xl border border-outline-variant/30 bg-surface-container-low transition-all focus-within:border-error">
                            <span class="material-symbols-outlined ml-4 text-on-surface-variant opacity-50">mail</span>
                            <input name="email" class="w-full bg-transparent border-none focus:ring-0 py-4 px-4 text-on-surface placeholder:text-outline/50 font-medium" placeholder="admin@system.local" type="email" required/>
                        </div>
                    </div>
                    <div class="group">
                        <label class="block text-[10px] font-bold tracking-[0.2em] uppercase text-on-surface-variant mb-2 ml-1">Master_Cipher</label>
                        <div class="relative flex items-center rounded-xl border border-outline-variant/30 bg-surface-container-low transition-all focus-within:border-error">
                            <span class="material-symbols-outlined ml-4 text-on-surface-variant opacity-50">security</span>
                            <input name="password" class="w-full bg-transparent border-none focus:ring-0 py-4 px-4 text-on-surface placeholder:text-outline/50 font-medium" placeholder="••••••••" type="password" required/>
                        </div>
                    </div>
                </div>
                <button class="w-full py-4 bg-gradient-to-r from-error-dim to-error rounded-xl font-black text-on-error tracking-[0.3em] uppercase shadow-[0_0_20px_rgba(255,110,132,0.3)] hover:shadow-[0_0_30px_rgba(255,110,132,0.5)] active:scale-95 transition-all" type="submit">
                    BYPASS_RESTRICTIONS
                </button>
            </form>
        </div>
        
        <div class="h-1 w-full bg-error"></div>
    </div>
</div>
{% endblock %}
